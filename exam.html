<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ISO 27001:2022 正式模擬考系統</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .exam-container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        
        /* 考場控制區 */
        .exam-setup { background: #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .timer { font-size: 24px; font-weight: bold; color: var(--danger); background: #fff; padding: 10px 20px; border-radius: 5px; border: 2px solid var(--danger); }
        
        /* 題目卡片 */
        .q-card { background: #fff; border: 1px solid #dee2e6; padding: 25px; margin-bottom: 25px; border-radius: 8px; transition: 0.3s; }
        .q-type-tag { background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 10px; }
        .q-text { font-size: 19px; font-weight: bold; margin: 15px 0; }
        
        /* 選項與互動 */
        .opt-label { display: block; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 6px; cursor: pointer; }
        .opt-label:hover { background: #f1f3f5; }
        .opt-label input { margin-right: 12px; }
        
        .match-row, .order-row { display: flex; align-items: center; margin: 10px 0; gap: 10px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #adb5bd; }

        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-start { background: var(--accent); color: white; }
        .btn-submit { background: var(--success); color: white; display: none; }
        
        #result-box { display: none; text-align: center; padding: 30px; background: #d4edda; border-radius: 10px; margin-top: 30px; }
        .ans-hint { display: none; margin-top: 15px; padding: 15px; background: #fff3cd; border-left: 5px solid #ffc107; }
        .wrong-ans { border: 2px solid var(--danger) !important; background: #fff5f5; }
    </style>
</head>
<body>

<div class="exam-container">
    <div class="header-bar">
        <h2>📝 ISO 27001:2022 模擬考場</h2>
        <div id="timerDisplay" class="timer">00:00:00</div>
    </div>

    <div class="exam-setup" id="setupBox">
        <div>
            <label>模式：</label>
            <select id="unitPick">
                <option value="all">全單元混合 (500題隨機)</option>
                <option value="unit1">單元一：管理系統標準</option>
                <option value="unit2">單元二：稽核概念責任</option>
                <option value="unit3">單元三：稽核規劃</option>
                <option value="unit4">單元四：稽核執行</option>
                <option value="unit5">單元五：報告與結束</option>
            </select>
        </div>
        <div>
            <label>題數：</label>
            <select id="countPick">
                <option value="10">10 題 (快速練習)</option>
                <option value="20">20 題 (標準測驗)</option>
                <option value="50">50 題 (正式模擬)</option>
            </select>
        </div>
        <button class="btn btn-start" onclick="startExam()">進入考場</button>
    </div>

    <div id="examArea"></div>

    <div style="text-align: center; margin-top: 40px;">
        <button id="submitBtn" class="btn btn-submit" onclick="finishExam()">交卷結算</button>
    </div>

    <div id="result-box">
        <h1 id="finalScore">得分：0 / 0</h1>
        <p id="scorePercent"></p>
        <button class="btn btn-start" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    // --- 題目數據庫開始 ---
    // 請將之前產出的 500 題完整貼入以下對應的陣列中
    const MASTER_BANK = {
        unit1: [ /* 貼入單元一題庫 */ ],
        unit2: [ /* 貼入單元二題庫 */ ],
        unit3: [ /* 貼入單元三題庫 */ ],
        unit4: [ /* 貼入單元四題庫 */ ],
        unit5: [ /* 貼入單元五題庫 */ ]
    };
    // --- 題目數據庫結束 ---

    let examData = [];
    let timerInterval;
    let secondsElapsed = 0;

    function startExam() {
        const unit = document.getElementById('unitPick').value;
        const count = parseInt(document.getElementById('countPick').value);
        let pool = [];

        if (unit === 'all') {
            Object.values(MASTER_BANK).forEach(u => pool = pool.concat(u));
        } else {
            pool = MASTER_BANK[unit];
        }

        if (pool.length === 0) {
            alert("錯誤：題庫資料為空！請確認 MASTER_BANK 內是否已貼入題目數據。");
            return;
        }

        examData = pool.sort(() => Math.random() - 0.5).slice(0, count);
        
        document.getElementById('setupBox').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'inline-block';
        renderExam();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let h = Math.floor(secondsElapsed / 3600).toString().padStart(2, '0');
            let m = Math.floor((secondsElapsed % 3600) / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function renderExam() {
        const area = document.getElementById('examArea');
        area.innerHTML = '';

        examData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `q-card-${idx}`;

            let html = `<div class="q-type-tag">${getTypeLabel(q.type)}</div><strong>題目 ${idx+1}</strong>`;
            
            if (q.type === 'single' || q.type === 'multi') {
                html += `<div class="q-text">${q.q}</div>`;
                q.options.forEach((opt, oi) => {
                    const inputType = q.type === 'single' ? 'radio' : 'checkbox';
                    html += `
                        <label class="opt-label">
                            <input type="${inputType}" name="ans${idx}" value="${oi}"> ${opt}
                        </label>`;
                });
            } else if (q.type === 'fill') {
                let text = q.q;
                Object.keys(q.blanks).forEach(k => {
                    let opts = `<option value="">請選擇...</option>` + q.blanks[k].map(o => `<option value="${o}">${o}</option>`).join('');
                    text = text.replace(`[__${k}__]`, `<select class="fill-input" data-key="${k}">${opts}</select>`);
                });
                html += `<div class="q-text">${text}</div>`;
            } else if (q.type === 'match') {
                html += `<div class="q-text">${q.q}</div>`;
                q.items.forEach((item, ii) => {
                    let opts = `<option value="">選擇...</option>` + q.options.map((o, oi) => `<option value="${oi}">${o}</option>`).join('');
                    html += `<div class="match-row"><span style="width:50%">${item}</span> <select class="match-input">${opts}</select></div>`;
                });
            } else if (q.type === 'order') {
                html += `<div class="q-text">${q.q}</div>`;
                q.options.forEach((opt, oi) => {
                    let opts = `<option value="">順序...</option>` + q.options.map((_, i) => `<option value="${i}">${i+1}</option>`).join('');
                    html += `<div class="order-row"><select class="order-input">${opts}</select> <span>${opt}</span></div>`;
                });
            }

            html += `<div class="ans-hint" id="hint-${idx}"><strong>解析：</strong>${q.hint}</div>`;
            card.innerHTML = html;
            area.appendChild(card);
        });
    }

    function getTypeLabel(type) {
        return { single: '單選', multi: '多選', fill: '填空', match: '配對', order: '排序' }[type];
    }

    function finishExam() {
        clearInterval(timerInterval);
        let correctCount = 0;

        examData.forEach((q, idx) => {
            let userCorrect = false;
            const card = document.getElementById(`q-card-${idx}`);

            if (q.type === 'single') {
                const picked = document.querySelector(`input[name="ans${idx}"]:checked`);
                if (picked && parseInt(picked.value) === q.ans) userCorrect = true;
            } else if (q.type === 'multi') {
                const picked = Array.from(document.querySelectorAll(`input[name="ans${idx}"]:checked`)).map(i => parseInt(i.value));
                if (JSON.stringify(picked.sort()) === JSON.stringify(q.ans.sort())) userCorrect = true;
            } else if (q.type === 'fill') {
                const picks = Array.from(card.querySelectorAll('select')).map(s => s.value);
                if (JSON.stringify(picks) === JSON.stringify(q.ans)) userCorrect = true;
            } else if (q.type === 'match' || q.type === 'order') {
                const picks = Array.from(card.querySelectorAll('select')).map(s => parseInt(s.value));
                if (JSON.stringify(picks) === JSON.stringify(q.ans)) userCorrect = true;
            }

            if (userCorrect) {
                correctCount++;
                card.style.borderColor = "var(--success)";
            } else {
                card.classList.add('wrong-ans');
                document.getElementById(`hint-${idx}`).style.display = 'block';
            }
            // 鎖定所有輸入
            Array.from(card.querySelectorAll('input, select')).forEach(i => i.disabled = true);
        });

        document.getElementById('submitBtn').style.display = 'none';
        const resBox = document.getElementById('result-box');
        resBox.style.display = 'block';
        document.getElementById('finalScore').innerText = `得分：${correctCount} / ${examData.length}`;
        document.getElementById('scorePercent').innerText = `及格率：${Math.round(correctCount/examData.length*100)}% (目標 70%)`;
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
