<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 27001:2022 稽核考場系統 (JSON版)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .exam-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .timer-box { font-size: 22px; font-weight: bold; color: var(--danger); background: #fff1f0; padding: 10px 20px; border-radius: 8px; border: 2px solid var(--danger); }
        .setup-panel { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; border: 1px solid #e9ecef; }
        select, .btn { padding: 10px 15px; border-radius: 6px; border: 1px solid #ced4da; font-size: 16px; outline: none; }
        .btn { cursor: pointer; font-weight: bold; transition: 0.3s; border: none; }
        .btn-start { background: var(--accent); color: white; }
        .btn-submit { background: var(--success); color: white; display: none; margin: 20px auto; width: 200px; }
        .q-card { background: #fff; border: 1px solid #dee2e6; padding: 25px; margin-bottom: 25px; border-radius: 10px; position: relative; }
        .q-type-tag { display: inline-block; background: var(--primary); color: white; padding: 3px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
        .q-text { font-size: 18px; font-weight: bold; line-height: 1.5; margin-bottom: 15px; }
        .opt-label { display: block; padding: 12px 15px; margin: 8px 0; border: 1px solid #e9ecef; border-radius: 8px; cursor: pointer; }
        .opt-label:hover { background: #f8f9fa; }
        .match-row, .order-row { display: flex; align-items: center; margin: 12px 0; gap: 15px; background: #fdfdfd; padding: 8px; border-radius: 5px; }
        .ans-hint { display: none; margin-top: 20px; padding: 15px; background: #fff9db; border-left: 5px solid var(--warning); border-radius: 4px; }
        .wrong-card { border: 2px solid var(--danger) !important; background: #fff5f5; }
        .correct-card { border: 2px solid var(--success) !important; background: #f6ffed; }
        #resultArea { display: none; text-align: center; background: #e6f7ff; padding: 40px; border-radius: 15px; margin-top: 30px; }
        .score-num { font-size: 48px; color: var(--accent); font-weight: bold; }
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; justify-content:center; align-items:center; z-index:1000; font-size:20px; font-weight:bold; }
    </style>
</head>
<body>

<div id="loading-overlay">⏳ 正在載入題庫 questions.json...</div>

<div class="exam-container">
    <div class="header">
        <h2>🛡️ ISO 27001 稽核考場 (JSON模式)</h2>
        <div id="timerDisplay" class="timer-box">00:00:00</div>
    </div>

    <div class="setup-panel" id="setupPanel">
        <div>
            <label>測驗單元：</label>
            <select id="unitSelect">
                <option value="all">全單元混合</option>
                <option value="unit1">單元一</option>
                <option value="unit2">單元二</option>
                <option value="unit3">單元三</option>
                <option value="unit4">單元四</option>
                <option value="unit5">單元五</option>
            </select>
        </div>
        <div>
            <label>抽取題數：</label>
            <select id="countSelect">
                <option value="10">10 題</option>
                <option value="20" selected>20 題</option>
                <option value="50">50 題</option>
            </select>
        </div>
        <button class="btn btn-start" onclick="startExam()">開始測驗</button>
    </div>

    <div id="quizArea"></div>
    <div style="text-align: center;"><button id="submitBtn" class="btn btn-submit" onclick="submitExam()">提交試卷結算</button></div>

    <div id="resultArea">
        <h1>測驗結算</h1>
        <div class="score-num" id="finalScore">0</div>
        <p id="scoreDetail"></p>
        <button class="btn btn-start" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
    let MASTER_BANK = null;
    let currentQuestions = [];
    let timerInterval;
    let seconds = 0;

    // --- 自動載入 JSON 檔案 ---
    window.onload = function() {
        fetch('questions.json')
            .then(res => {
                if (!res.ok) throw new Error("找不到 questions.json");
                return res.json();
            })
            .then(data => {
                MASTER_BANK = data;
                document.getElementById('loading-overlay').style.display = 'none';
                console.log("題庫載入成功");
            })
            .catch(err => {
                document.getElementById('loading-overlay').innerText = "❌ 載入失敗：請確保在伺服器環境下執行 (如 Vercel 或 Live Server)";
                console.error(err);
            });
    };

    function startExam() {
        if (!MASTER_BANK) return alert("題庫尚未就緒");
        const unit = document.getElementById('unitSelect').value;
        const count = parseInt(document.getElementById('countSelect').value);
        let pool = (unit === 'all') ? Object.values(MASTER_BANK).flat() : MASTER_BANK[unit];
        
        currentQuestions = pool.sort(() => Math.random() - 0.5).slice(0, count);
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'block';
        renderQuiz();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function renderQuiz() {
        const area = document.getElementById('quizArea');
        area.innerHTML = '';
        currentQuestions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `q-card-${idx}`;
            let html = `<div class="q-type-tag">${idx + 1}. ${q.type}</div><div class="q-text">${q.q}</div>`;
            if (q.type === 'single' || q.type === 'multi') {
                const inputType = q.type === 'single' ? 'radio' : 'checkbox';
                q.options.forEach((opt, oi) => {
                    html += `<label class="opt-label"><input type="${inputType}" name="q${idx}" value="${oi}"> ${opt}</label>`;
                });
            } else if (q.type === 'fill') {
                let fillBody = q.q;
                Object.keys(q.blanks).forEach(key => {
                    let options = `<option value="">選擇...</option>` + q.blanks[key].map(o => `<option value="${o}">${o}</option>`).join('');
                    fillBody = fillBody.replace(`[__${key}__]`, `<select class="fill-input" data-key="${key}">${options}</select>`);
                });
                html = `<div class="q-type-tag">填充題</div><div class="q-text">${idx+1}. ${fillBody}</div>`;
            } else if (q.type === 'match' || q.type === 'order') {
                let selectItems = (q.type === 'match') ? q.items : q.options;
                selectItems.forEach((item, ii) => {
                    let options = `<option value="">...</option>` + q.options.map((o, oi) => `<option value="${oi}">${q.type==='order'?oi+1:o}</option>`).join('');
                    html += `<div class="match-row"><span>${q.type==='order'?item:item}</span> <select class="match-input">${options}</select></div>`;
                });
            }
            html += `<div class="ans-hint" id="hint-${idx}">🎯 <b>解析：</b><br>${q.hint}</div>`;
            card.innerHTML = html;
            area.appendChild(card);
        });
    }

    function submitExam() {
        clearInterval(timerInterval);
        let score = 0;
        currentQuestions.forEach((q, idx) => {
            let isCorrect = false;
            const card = document.getElementById(`q-card-${idx}`);
            const userInputs = card.querySelectorAll('input:checked, select');
            
            if (q.type === 'single') {
                if (userInputs[0] && parseInt(userInputs[0].value) === q.ans) isCorrect = true;
            } else if (q.type === 'multi') {
                const vals = Array.from(userInputs).map(i => parseInt(i.value));
                if (JSON.stringify(vals.sort()) === JSON.stringify(q.ans.sort())) isCorrect = true;
            } else {
                const vals = Array.from(card.querySelectorAll('select')).map(s => q.type==='fill' ? s.value : parseInt(s.value));
                if (JSON.stringify(vals) === JSON.stringify(q.ans)) isCorrect = true;
            }

            if (isCorrect) { score++; card.classList.add('correct-card'); } 
            else { card.classList.add('wrong-card'); document.getElementById(`hint-${idx}`).style.display = 'block'; }
            Array.from(card.querySelectorAll('input, select')).forEach(el => el.disabled = true);
        });
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('finalScore').innerText = Math.round((score / currentQuestions.length) * 100) + " 分";
        document.getElementById('scoreDetail').innerText = `答對：${score} / ${currentQuestions.length}`;
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
