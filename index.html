<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 27001:2022 主導稽核員模擬考系統</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--primary); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        /* 控制區 */
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; background: #ecf0f1; padding: 15px; border-radius: 8px; }
        select, button { padding: 10px 15px; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 16px; cursor: pointer; }
        button { background: var(--accent); color: white; border: none; transition: 0.3s; }
        button:hover { background: #2980b9; }

        /* 題目樣式 */
        .question-card { margin-bottom: 40px; padding: 20px; border: 1px solid #eee; border-radius: 8px; position: relative; }
        .q-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--accent); margin-bottom: 15px; }
        .q-text { font-size: 18px; margin-bottom: 20px; font-weight: 500; }
        
        /* 各類題型 UI */
        .options-list { list-style: none; padding: 0; }
        .option-item { padding: 10px; margin: 5px 0; border: 1px solid #dfe6e9; border-radius: 5px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .option-item:hover { background: #f1f2f6; }
        .option-item input { margin-right: 15px; transform: scale(1.2); }

        .match-row, .order-row { display: flex; align-items: center; margin-bottom: 10px; gap: 15px; }
        .match-row select, .order-row select { width: 200px; }
        
        .fill-blank { border: none; border-bottom: 2px solid var(--accent); color: var(--accent); font-weight: bold; text-align: center; padding: 0 5px; background: transparent; }

        /* 結果顯示 */
        #resultArea { text-align: center; display: none; margin-top: 30px; padding: 20px; background: #e8f4fd; border-radius: 8px; }
        .hint { display: none; color: var(--danger); font-size: 14px; margin-top: 10px; font-style: italic; }
        .correct { background: #dff9fb !important; border-color: var(--success) !important; }
        .wrong { background: #fab1a0 !important; border-color: var(--danger) !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ ISO 27001 稽核大典控制中心</h1>
    
    <div class="controls">
        <select id="unitSelect">
            <option value="all">混合模擬考 (全單元隨機)</option>
            <option value="unit1">單元一：管理系統標準 (100題)</option>
            <option value="unit2">單元二：稽核概念責任 (100題)</option>
            <option value="unit3">單元三：稽核規劃 (100題)</option>
            <option value="unit4">單元四：稽核執行 (100題)</option>
            <option value="unit5">單元五：報告與結束 (100題)</option>
        </select>
        <select id="countSelect">
            <option value="10">抽取 10 題</option>
            <option value="20">抽取 20 題</option>
            <option value="50">抽取 50 題</option>
        </select>
        <button onclick="initQuiz()">生成試卷</button>
        <button onclick="submitQuiz()" style="background: var(--success);">繳卷結算</button>
    </div>

    <div id="quizArea">
        </div>

    <div id="resultArea">
        <h2>測驗結束</h2>
        <p id="scoreDisplay" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="location.reload()">重新測驗</button>
    </div>
</div>

<script>
    // 這裡請貼入你之前收集的所有 MASTER_BANK 資料
    const MASTER_BANK = {
        unit1: [/*...100題...*/],
        unit2: [/*...100題...*/],
        unit3: [/*...100題...*/],
        unit4: [/*...100題...*/],
        unit5: [/*...100題...*/]
    };

    let currentQuestions = [];

    function initQuiz() {
        const unit = document.getElementById('unitSelect').value;
        const count = parseInt(document.getElementById('countSelect').value);
        let pool = [];

        if (unit === 'all') {
            Object.keys(MASTER_BANK).forEach(u => pool = pool.concat(MASTER_BANK[u]));
        } else {
            pool = MASTER_BANK[unit];
        }

        currentQuestions = shuffle(pool).slice(0, count);
        renderQuiz();
        window.scrollTo(0, 0);
        document.getElementById('resultArea').style.display = 'none';
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function renderQuiz() {
        const area = document.getElementById('quizArea');
        area.innerHTML = '';

        currentQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;

            let content = `
                <div class="q-header">
                    <span>題目 ${index + 1} (${q.unit})</span>
                    <span>題型：${getTypeName(q.type)}</span>
                </div>
            `;

            if (q.type === 'single' || q.type === 'multi') {
                content += `<div class="q-text">${q.q}</div><div class="options-list">`;
                q.options.forEach((opt, i) => {
                    const inputType = q.type === 'single' ? 'radio' : 'checkbox';
                    content += `
                        <label class="option-item">
                            <input type="${inputType}" name="q${index}" value="${i}">
                            ${opt}
                        </label>`;
                });
                content += `</div>`;
            } 
            else if (q.type === 'fill') {
                let filledText = q.q;
                Object.keys(q.blanks).forEach(key => {
                    let opts = `<option value="">請選擇...</option>` + q.blanks[key].map(o => `<option value="${o}">${o}</option>`).join('');
                    filledText = filledText.replace(`[__${key}__]`, `<select class="fill-blank" data-key="${key}">${opts}</select>`);
                });
                content += `<div class="q-text">${filledText}</div>`;
            }
            else if (q.type === 'match') {
                content += `<div class="q-text">${q.q}</div>`;
                q.items.forEach((item, i) => {
                    let opts = `<option value="">請選擇對應項...</option>` + q.options.map((o, oi) => `<option value="${oi}">${o}</option>`).join('');
                    content += `
                        <div class="match-row">
                            <span style="flex:1">${item}</span>
                            <select class="match-select" data-index="${i}">${opts}</select>
                        </div>`;
                });
            }
            else if (q.type === 'order') {
                content += `<div class="q-text">${q.q}</div>`;
                q.options.forEach((opt, i) => {
                    let opts = `<option value="">順序...</option>` + q.options.map((_, oi) => `<option value="${oi}">${oi+1}</option>`).join('');
                    content += `
                        <div class="order-row">
                            <select class="order-select" data-index="${i}">${opts}</select>
                            <span style="flex:1">${opt}</span>
                        </div>`;
                });
            }

            content += `<div class="hint" id="hint-${index}">解析：${q.hint}</div>`;
            card.innerHTML = content;
            area.appendChild(card);
        });
    }

    function getTypeName(type) {
        const map = { single: '單選', multi: '多選', fill: '填充', match: '配對', order: '排序' };
        return map[type] || type;
    }

    function submitQuiz() {
        let score = 0;
        currentQuestions.forEach((q, index) => {
            let isCorrect = false;
            const card = document.getElementById(`q-card-${index}`);

            if (q.type === 'single') {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.ans) isCorrect = true;
            } 
            else if (q.type === 'multi') {
                const selected = Array.from(document.querySelectorAll(`input[name="q${index}"]:checked`)).map(i => parseInt(i.value));
                if (JSON.stringify(selected.sort()) === JSON.stringify(q.ans.sort())) isCorrect = true;
            }
            else if (q.type === 'fill') {
                const selects = card.querySelectorAll('.fill-blank');
                const userAns = Array.from(selects).map(s => s.value);
                if (JSON.stringify(userAns) === JSON.stringify(q.ans)) isCorrect = true;
            }
            else if (q.type === 'match' || q.type === 'order') {
                const selects = card.querySelectorAll('select');
                const userAns = Array.from(selects).map(s => parseInt(s.value));
                if (JSON.stringify(userAns) === JSON.stringify(q.ans)) isCorrect = true;
            }

            if (isCorrect) {
                score++;
                card.classList.add('correct');
            } else {
                card.classList.add('wrong');
                document.getElementById(`hint-${index}`).style.display = 'block';
            }
        });

        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';
        document.getElementById('scoreDisplay').innerText = `您的得分：${score} / ${currentQuestions.length} (${Math.round(score/currentQuestions.length*100)}分)`;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
