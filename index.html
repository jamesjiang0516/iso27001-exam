<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ISO 27001 專業模擬考系統 v2.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 850px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* 題型標籤 */
        .tag { padding: 4px 10px; border-radius: 4px; color: white; font-size: 0.8em; margin-bottom: 10px; display: inline-block; }
        .tag-single { background: #4a90e2; }
        .tag-multi { background: #a569bd; }
        .tag-fill { background: #f1c40f; color: #333; }
        .tag-match { background: #27ae60; }
        .tag-order { background: #e74c3c; }

        .option-item { display: block; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin: 10px 0; cursor: pointer; }
        .match-row { display: flex; align-items: center; margin: 10px 0; gap: 20px; }
        select { padding: 8px; border-radius: 4px; flex: 1; }
        .order-item { background: #eee; padding: 10px; margin: 5px 0; display: flex; align-items: center; gap: 10px; cursor: move; }

        .footer-nav { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="welcome">
        <h1>ISO 27001 模擬測驗系統</h1>
        <p>正在載入題庫中，請稍候...</p>
        <button id="startBtn" class="btn hidden" onclick="startExam()">開始測驗</button>
    </div>

    <div id="quiz" class="hidden">
        <div style="display: flex; justify-content: space-between;">
            <div id="progress">題目：1 / 40</div>
            <div id="timer" style="font-weight: bold; color: red;">105:00</div>
        </div>
        <div id="questionArea" style="margin-top: 20px;"></div>
        <div class="footer-nav">
            <span style="color: #888;">* 進入下一題後無法回頭</span>
            <button class="btn" onclick="handleNext()">下一題</button>
        </div>
    </div>

    <div id="result" class="hidden" style="text-align: center;">
        <h1>測驗結束</h1>
        <div id="scoreDisplay" style="font-size: 4em; color: var(--accent);">0</div>
        <p id="evalText"></p>
        <button class="btn" onclick="location.reload()">重新測驗</button>
    </div>
</div>

<script>
let allQuestions = {};
let currentExam = [];
let currentIndex = 0;
let userScore = 0;
let timeLeft = 105 * 60;

// 1. 從 JSON 提取資料
fetch('questions.json')
    .then(res => res.json())
    .then(data => {
        allQuestions = data;
        document.getElementById('startBtn').classList.remove('hidden');
        document.querySelector('#welcome p').innerText = "題庫載入成功，準備好了嗎？";
    })
    .catch(err => alert("載入失敗，請確認 questions.json 是否存在。"));

function startExam() {
    // 隨機抽題邏輯
    currentExam = [
        ...pick(allQuestions.unit1, 6), ...pick(allQuestions.unit2, 6),
        ...pick(allQuestions.unit3, 6), ...pick(allQuestions.unit4, 14),
        ...pick(allQuestions.unit5, 8)
    ];
    
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    renderQuestion();
    startTimer();
}

function pick(arr, n) { return [...arr].sort(() => 0.5 - Math.random()).slice(0, n); }

function renderQuestion() {
    const q = currentExam[currentIndex];
    const area = document.getElementById('questionArea');
    document.getElementById('progress').innerText = `題目：${currentIndex + 1} / ${currentExam.length}`;
    
    let html = `<span class="tag tag-${q.type}">${q.type.toUpperCase()}</span><h3>${q.q}</h3>`;

    if (q.type === 'single') {
        q.options.forEach((opt, i) => {
            html += `<label class="option-item"><input type="radio" name="ans" value="${i}"> ${opt}</label>`;
        });
    } 
    else if (q.type === 'multi') {
        q.options.forEach((opt, i) => {
            html += `<label class="option-item"><input type="checkbox" name="ans" value="${i}"> ${opt}</label>`;
        });
    } 
    else if (q.type === 'match') {
        q.items.forEach((item, i) => {
            html += `<div class="match-row"><span>${item}</span><select class="match-select">
                <option value="">請選擇對應項...</option>
                ${q.options.map((opt, idx) => `<option value="${idx}">${opt}</option>`).join('')}
            </select></div>`;
        });
    } 
    else if (q.type === 'order') {
        q.options.forEach((opt, i) => {
            html += `<div class="order-item">${i+1}. <span>${opt}</span> <input type="number" class="order-val" min="1" max="${q.options.length}" style="width:40px; margin-left:auto;"></div>`;
        });
    }
    else if (q.type === 'fill') {
        // 簡化版填空：用下拉選單代替
        let fillQ = q.q;
        Object.keys(q.blanks).forEach(key => {
            let selectHtml = `<select class="fill-select" data-key="${key}"><option value="">?</option>`;
            q.blanks[key].forEach(opt => selectHtml += `<option value="${opt}">${opt}</option>`);
            selectHtml += `</select>`;
            fillQ = fillQ.replace(`[__${key}__]`, selectHtml);
        });
        html += `<div style="line-height: 2.5;">${fillQ}</div>`;
    }

    area.innerHTML = html;
}

function handleNext() {
    const q = currentExam[currentIndex];
    let isCorrect = false;

    // 驗證邏輯
    if (q.type === 'single') {
        const sel = document.querySelector('input[name="ans"]:checked');
        if(sel && parseInt(sel.value) === q.ans) isCorrect = true;
    } 
    else if (q.type === 'multi') {
        const sels = Array.from(document.querySelectorAll('input[name="ans"]:checked')).map(v => parseInt(v.value));
        if(JSON.stringify(sels.sort()) === JSON.stringify(q.ans.sort())) isCorrect = true;
    }
    else if (q.type === 'match') {
        const sels = Array.from(document.querySelectorAll('.match-select')).map(v => parseInt(v.value));
        if(JSON.stringify(sels) === JSON.stringify(q.ans)) isCorrect = true;
    }
    else if (q.type === 'order') {
        const sels = Array.from(document.querySelectorAll('.order-val')).map(v => parseInt(v.value) - 1);
        if(JSON.stringify(sels) === JSON.stringify(q.ans)) isCorrect = true;
    }
    else if (q.type === 'fill') {
        const sels = Array.from(document.querySelectorAll('.fill-select')).map(v => v.value);
        if(JSON.stringify(sels) === JSON.stringify(q.ans)) isCorrect = true;
    }

    if(isCorrect) userScore += q.weight;

    if(currentIndex < currentExam.length - 1) {
        currentIndex++;
        renderQuestion();
    } else {
        showResult();
    }
}

function startTimer() {
    setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) showResult();
    }, 1000);
}

function showResult() {
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    let finalScore = Math.round(userScore * 10) / 10;
    document.getElementById('scoreDisplay').innerText = finalScore;
    document.getElementById('evalText').innerText = finalScore >= 56 ? "✅ 合格！" : "❌ 未合格 (及格門檻 56 分)";
}
</script>
</body>
</html>
